name: Deploy Daily Picks

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build static site
        env:
          BETTINGEXPERT_USERNAME: ${{ secrets.BETTINGEXPERT_USERNAME }}
          BETTINGEXPERT_PASSWORD: ${{ secrets.BETTINGEXPERT_PASSWORD }}
          BETTINGEXPERT_HEADLESS: "true"
          BETTINGEXPERT_TOP_N: "20"
          BETTINGEXPERT_MAX_LOAD_MORE_CLICKS: "20"
          SITE_TITLE: "Best Picks for Today"
          SITE_TAGLINE: "Daily best picks"
        run: npm run build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
