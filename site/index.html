<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Consensus Picks</title>
    <meta
      name="description"
      content="Daily BettingExpert consensus picks generated from the top-performing tipsters."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero__glow"></div>
        <p class="hero__eyebrow">Daily consensus board</p>
        <h1 id="site-title">Consensus Picks</h1>
        <p class="hero__tagline" id="site-tagline">
          Daily BettingExpert consensus picks
        </p>
        <div class="hero__meta">
          <span id="source-date">Loading date…</span>
          <span id="summary-line">Preparing latest picks…</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel--primary">
          <div class="panel__header">
            <div>
              <p class="panel__label">Today’s board</p>
              <h2>Consensus Picks</h2>
            </div>
            <span class="status-pill" id="status-pill">Loading</span>
          </div>
          <div id="empty-state" class="empty-state" hidden></div>
          <div id="picks-list" class="cards"></div>
        </section>

        <aside class="panel panel--secondary">
          <div class="panel__header">
            <div>
              <p class="panel__label">Snapshot</p>
              <h2>Run Details</h2>
            </div>
          </div>
          <dl class="stats">
            <div class="stat">
              <dt>Tipster pool</dt>
              <dd id="tipster-pool">-</dd>
            </div>
            <div class="stat">
              <dt>Total tips scanned</dt>
              <dd id="total-tips">-</dd>
            </div>
            <div class="stat">
              <dt>Rule</dt>
              <dd id="consensus-rule">-</dd>
            </div>
            <div class="stat">
              <dt>Fetched at</dt>
              <dd id="fetched-at">-</dd>
            </div>
          </dl>

          <div class="subpanel">
            <p class="panel__label">Top tipsters</p>
            <ol id="tipsters-list" class="tipsters-list"></ol>
          </div>

          <div class="subpanel">
            <p class="panel__label">Warnings</p>
            <ul id="warnings-list" class="warnings-list"></ul>
          </div>
        </aside>
      </main>
    </div>

    <template id="pick-card-template">
      <article class="card">
        <div class="card__topline">
          <span class="sport-badge"></span>
          <span class="count-badge"></span>
        </div>
        <h3 class="card__event"></h3>
        <p class="card__outcome"></p>
        <div class="card__tipsters"></div>
        <details class="arguments">
          <summary>Why tipsters backed it</summary>
          <div class="arguments__body"></div>
        </details>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
